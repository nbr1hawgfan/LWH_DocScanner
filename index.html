<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover, user-scalable=no" />
<title>LWH Document Scan</title>
<meta name="description" content="Scan bills of lading and documents, auto-crop, and send from your truck." />
<meta name="theme-color" content="#0a5870" />
<link rel="manifest" href="manifest.json" />
<link rel="apple-touch-icon" href="icons/icon-192.png" />
<meta name="apple-mobile-web-app-capable" content="yes" />
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
<link rel="stylesheet" href="css/style.css" />
</head>
<body>

<header class="app-header">
  <img src="icons/icon-192.png" alt="" />
  <h1>LWH Document Scan</h1>
</header>

<!-- HOME -->
<main id="screen-home" class="screen active">
  <div class="home-hero">
    <div class="doc-badge">
      <svg viewBox="0 0 24 24" fill="none" stroke="#fff" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M4 4h6l2 2h8v12a2 2 0 0 1-2 2H4a2 2 0 0 1-2-2V6a2 2 0 0 1 2-2z"/></svg>
    </div>
    <h2>Scan a document</h2>
    <p>BOLs, PODs, or anything else you need to send in.</p>
  </div>
  <div class="home-actions">
    <button id="homeNewScanBtn" class="btn btn-primary btn-lg btn-block">Start New Scan</button>
    <button id="homeContinueBtn" class="btn btn-secondary btn-block">Continue Current Scan</button>
  </div>
  <p class="app-version">v1.5.1</p>
</main>

<!-- CAMERA -->
<section id="screen-camera" class="screen">
  <div class="camera-wrap">
    <video id="video" autoplay playsinline muted></video>
    <canvas id="liveOverlay" class="live-overlay"></canvas>
    <p id="cameraStatus" class="camera-status hidden"></p>
    <div class="camera-controls">
      <button id="cameraCancelBtn" class="camera-side-btn">Cancel</button>
      <button id="captureBtn" class="capture-btn" aria-label="Take photo"></button>
      <label class="camera-side-btn" for="choosePhotoInput">Choose Photo</label>
    </div>
  </div>
  <input type="file" id="choosePhotoInput" accept="image/*" />
</section>

<!-- EDIT / AUTO-DETECTED CORNERS -->
<section id="screen-edit" class="screen">
  <div class="edit-canvas-wrap">
    <canvas id="editCanvas"></canvas>
    <canvas id="editLoupe" class="edit-loupe hidden" width="160" height="160"></canvas>
  </div>
  <p id="editHint" class="edit-hint">Finding the document edges…</p>
  <div class="edit-actions">
    <button id="editCancelBtn" class="btn btn-ghost">Retake</button>
    <button id="editRedetectBtn" class="btn btn-secondary">Re-scan Edges</button>
  </div>
  <button id="editConfirmBtn" class="btn btn-primary btn-lg btn-block" disabled>Use This Crop</button>
</section>

<!-- PAGES REVIEW -->
<section id="screen-pages" class="screen">
  <div class="pages-toolbar">
    <button id="backHomeBtn" class="btn btn-ghost" style="padding:8px 12px;min-height:auto;">←</button>
    <h2>Review Pages</h2>
    <span id="pageCount">0 pages</span>
  </div>

  <div class="filter-chips">
    <button id="filterOriginal" class="chip active">Original</button>
    <button id="filterBw" class="chip">B &amp; W</button>
    <button id="filterSharpen" class="chip">Sharpen</button>
  </div>
  <p class="edit-hint" style="margin:-8px 0 0;">Filter applies to the last page scanned.</p>

  <div id="pageList" class="page-list"></div>

  <div id="pageLightbox" class="lightbox hidden">
    <img id="lightboxImg" alt="Full-size page preview" />
    <button id="lightboxCloseBtn" class="lightbox-close" aria-label="Close">&times;</button>
  </div>

  <div class="pages-actions">
    <button id="addPageBtn" class="btn btn-secondary">+ Add Page</button>
    <button id="finishBtn" class="btn btn-primary" disabled>Done</button>
  </div>
</section>

<!-- RESULT / SEND -->
<section id="screen-result" class="screen">
  <div class="result-summary">
    <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M4 4h6l2 2h8v12a2 2 0 0 1-2 2H4a2 2 0 0 1-2-2V6a2 2 0 0 1 2-2z"/></svg>
    <span>Your PDF is ready to send.</span>
  </div>

  <div>
    <label class="field-label" for="resultPdfName">File name</label>
    <input type="text" id="resultPdfName" class="pdf-name" />
  </div>

  <div class="result-actions">
    <button id="previewPdfBtn" class="btn btn-secondary">Preview Full PDF</button>
    <button id="shareBtn" class="btn btn-primary btn-lg">Share / Email PDF</button>
    <button id="driveBtn" class="btn btn-secondary hidden">Back Up to Drive</button>
    <button id="downloadBtn" class="btn btn-secondary">Download PDF</button>
    <button id="startOverBtn" class="btn btn-ghost">Start a New Scan</button>
  </div>
</section>

<!-- INSTALL BANNER -->
<div id="installBanner" class="install-banner hidden">
  <p>Add this to your home screen for one-tap scanning.</p>
  <button id="installBtn" class="btn btn-primary">Install</button>
  <button id="installDismissBtn" class="btn btn-ghost">Not now</button>
</div>

<!-- Third-party libs -->
<script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js"></script>
<script>
  // OpenCV.js checks for a pre-existing Module object and calls
  // onRuntimeInitialized once the WASM runtime (not just the JS file) is
  // actually ready. This must be defined before opencv.js loads.
  window.Module = {
    onRuntimeInitialized() {
      window.dispatchEvent(new Event("opencv-ready"));
    }
  };
</script>
<script async src="https://docs.opencv.org/4.8.0/opencv.js"></script>

<!-- App -->
<script src="js/config.js"></script>
<script src="js/scanner.js"></script>
<script src="js/pdf-export.js"></script>
<script src="js/share.js"></script>
<script src="js/drive.js"></script>
<script src="js/app.js"></script>
</body>
</html>
